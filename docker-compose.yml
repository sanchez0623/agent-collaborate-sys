services:
  # ---- 后端 API (.NET 10, MCR 镜像) ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multiagent-backend
    ports:
      - "5000:5000"
    volumes:
      - multiagent_data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - DB_PATH=/app/data/multiagent.db
      - Qdrant__Url=http://qdrant:6334
    restart: unless-stopped
    depends_on:
      qdrant:
        condition: service_healthy

  # ---- 前端 (React + Vite dev server) ----
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: multiagent-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://backend:5000
    restart: unless-stopped
    depends_on:
      - backend

  # ---- 向量数据库 (Qdrant) ----
  qdrant:
    image: qdrant/qdrant:latest
    container_name: multiagent-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  multiagent_data:
  qdrant_data:
