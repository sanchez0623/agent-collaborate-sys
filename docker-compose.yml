services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: multiagent
    ports:
      - "5000:5000"
    volumes:
      - multiagent_data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
      - DB_PATH=/app/data/multiagent.db
    restart: unless-stopped

volumes:
  multiagent_data:
